    async function loadGlobalCache() {
      const q = `
SELECT ?iso3 ?countryLabel (SAMPLE(?govFormLabel) AS ?govLabel) (MAX(?gdpValue) AS ?gdpMax) (MAX(?populationValue) AS ?populationMax) (MAX(?areaValue) AS ?areaMax) WHERE {
  ?country wdt:P31 wd:Q6256; wdt:P298 ?iso3.
  OPTIONAL { ?country wdt:P122 ?govForm. }
  OPTIONAL { ?country p:P2131 ?gdpStmt. ?gdpStmt ps:P2131 ?gdpValue. }
  OPTIONAL { ?country p:P1082 ?populationStmt. ?populationStmt ps:P1082 ?populationValue. }
  OPTIONAL { ?country wdt:P2046 ?areaValue. }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "${currentLang === "en" ? "en,zh" : "zh,en"}". }
}
GROUP BY ?iso3 ?countryLabel`;
      const json = await querySparqlWithFallback(q);

      for (const row of json?.results?.bindings || []) {
        const code = row.iso3?.value;
        if (!code) continue;
        const raw = Number(row.gdpMax?.value);
        let gdp = "NO RECORD";
        if (Number.isFinite(raw) && raw > 0) {
          const t = raw / 1e12;
          const b = raw / 1e9;
          gdp = t >= 1 ? `$ ${t.toFixed(2)} Trillion` : `$ ${b.toFixed(2)} Billion`;
        }
        const populationRaw = Number(row.populationMax?.value);
        const areaRaw = Number(row.areaMax?.value);
        globalCountryCache[code] = {
          name: row.countryLabel?.value || code,
          ideology: row.govLabel?.value || null,
          gdp,
          population: populationText(populationRaw),
          area: areaText(areaRaw),
          gdp_value_raw: raw,
          population_raw: populationRaw,
          area_raw: areaRaw
        };
      }
    }

    async function fetchLiveCountry(code) {
      const n = canonicalIso(code);
      if (detailCache[n]) return detailCache[n];

      const q = `
SELECT ?countryLabel ?hosLabel ?hogLabel ?hosImage ?hogImage ?govFormLabel ?gdpValue ?populationValue ?areaValue ?ethnicLabel ?flag ?hogPartyLabel ?hogPartyLogo ?hogPartySeal ?hogPartyPhoto ?capitalLabel ?capitalImage ?capitalCoord WHERE {
  ?country wdt:P31 wd:Q6256; wdt:P298 "${n}".
  OPTIONAL { ?country p:P35 ?hosStmt. ?hosStmt ps:P35 ?hos. FILTER NOT EXISTS { ?hosStmt pq:P582 [] } OPTIONAL { ?hos wdt:P18 ?hosImage. } }
  OPTIONAL {
    ?country p:P6 ?hogStmt.
    ?hogStmt ps:P6 ?hog.
    FILTER NOT EXISTS { ?hogStmt pq:P582 [] }
    OPTIONAL { ?hog wdt:P18 ?hogImage. }
    OPTIONAL {
      ?hog wdt:P102 ?hogParty.
      OPTIONAL { ?hogParty wdt:P154 ?hogPartyLogo. }
      OPTIONAL { ?hogParty wdt:P158 ?hogPartySeal. }
      OPTIONAL { ?hogParty wdt:P18 ?hogPartyPhoto. }
    }
  }
  OPTIONAL { ?country wdt:P122 ?govForm. }
  OPTIONAL { ?country p:P2131 ?gdpStmt. ?gdpStmt ps:P2131 ?gdpValue. }
  OPTIONAL { ?country p:P1082 ?populationStmt. ?populationStmt ps:P1082 ?populationValue. }
  OPTIONAL { ?country wdt:P2046 ?areaValue. }
  OPTIONAL { ?country wdt:P172 ?ethnic. }
  OPTIONAL { ?country wdt:P41 ?flag. }
  OPTIONAL {
    ?country wdt:P36 ?capital.
    OPTIONAL { ?capital wdt:P18 ?capitalImage. }
    OPTIONAL { ?capital wdt:P625 ?capitalCoord. }
  }
  SERVICE wikibase:label { bd:serviceParam wikibase:language "${currentLang === "en" ? "en,zh" : "zh,en"}". }
}
LIMIT 1`;
      const row = (await querySparqlWithFallback(q))?.results?.bindings?.[0];
      if (!row) return null;

      const live = {
        name: row.countryLabel?.value,
        hos: row.hosLabel?.value,
        hog: row.hogLabel?.value,
        hos_img: row.hosImage?.value,
        hog_img: row.hogImage?.value,
        flag: row.flag?.value,
        ideology: row.govFormLabel?.value,
        population: populationText(Number(row.populationValue?.value)),
        area: areaText(Number(row.areaValue?.value)),
        ethnicity: row.ethnicLabel?.value || null,
        ruling_party_name: row.hogPartyLabel?.value,
        ruling_party_logo: row.hogPartyLogo?.value || row.hogPartySeal?.value || row.hogPartyPhoto?.value,
        landmark_img: row.capitalImage?.value,
        landmark_name: row.capitalLabel?.value,
        capital_coord: parseWktPoint(row.capitalCoord?.value),
        gdp_value_raw: Number(row.gdpValue?.value),
        population_raw: Number(row.populationValue?.value),
        area_raw: Number(row.areaValue?.value),
        parliament: localizedParliamentList(n, parliamentData[n] || [])
      };

      const num = Number(row.gdpValue?.value);
      if (Number.isFinite(num) && num > 0) {
        const t = num / 1e12;
        const b = num / 1e9;
        live.gdp = t >= 1 ? `$ ${t.toFixed(2)} Trillion` : `$ ${b.toFixed(2)} Billion`;
      }

      detailCache[n] = live;
      return live;
    }

    async function fetchRestCountryFallback(code) {
      const n = canonicalIso(code);
      const urls = [
        `https://restcountries.com/v3.1/alpha/${n}`,
        `https://mirror.ghproxy.com/https://restcountries.com/v3.1/alpha/${n}`
      ];
      try {
        const data = await fetchJsonFromUrls(urls);
        const row = Array.isArray(data) ? data[0] : data;
        if (!row) return null;
        return {
          name: row.name?.common || row.name?.official || n,
          population: populationText(Number(row.population)),
          area: areaText(Number(row.area)),
          flag: row.flags?.png || row.flags?.svg,
          capital_coord: Array.isArray(row.capitalInfo?.latlng) && row.capitalInfo.latlng.length === 2
            ? [Number(row.capitalInfo.latlng[1]), Number(row.capitalInfo.latlng[0])]
            : null
        };
      } catch (_) {
        return null;
      }
    }

    async function showCountry(code, geoName) {
      const n = canonicalIso(code);
      const base = globalCountryCache[n] || {};
      const fallback = {
        name: base.name || geoName || n,
        hos: t("classified"),
        hog: t("classified"),
        ideology: base.ideology || t("unknown"),
        gdp: base.gdp || t("noRecord"),
        population: base.population || t("noRecord"),
        area: base.area || t("noRecord"),
        ethnicity: base.ethnicity || t("noRecord"),
        gdp_value_raw: Number(base.gdp_value_raw),
        population_raw: Number(base.population_raw),
        area_raw: Number(base.area_raw),
        parliament: localizedParliamentList(n, parliamentData[n] || [])
      };

      applyPanel(fallback, geoName, "sourceLocalCache", n);

      try {
        const live = await fetchLiveCountry(n);
        if (live) {
          applyPanel({ ...fallback, ...live }, geoName, "sourceLive", n);
          return;
        }
        const alt = await fetchRestCountryFallback(n);
        if (alt) applyPanel({ ...fallback, ...alt }, geoName, "sourceLive", n);
      } catch (_) {
        const alt = await fetchRestCountryFallback(n);
        if (alt) {
          applyPanel({ ...fallback, ...alt }, geoName, "sourceLive", n);
          return;
        }
        const s = document.getElementById("data-status");
        s.classList.add("warn");
        s.innerText = t("sourceLiveFailed");
      }
    }

    function updateProjectionAndSize() {
      width = window.innerWidth;
      height = window.innerHeight;
      svg.attr("width", width).attr("height", height);
      projection.scale(width / 6.5).translate([width / 2, height / 1.5]);
      worldLeft = projection([-180, 0])[0];
      worldRight = projection([180, 0])[0];
      worldWidth = worldRight - worldLeft;
      mapLayers.forEach((layer, idx) => {
        layer.attr("transform", `translate(${tileOffsets[idx] * worldWidth},0)`);
      });
    }

    function redrawMapPaths() {
      if (!Array.isArray(mapFeatures) || mapFeatures.length === 0) return;
      mapLayers.forEach(layer => {
        layer.selectAll("path.country").attr("d", geoPath);
      });
      if (selectedIso) syncSelectionStyles();
    }

    function handleResize() {
      updateProjectionAndSize();
      redrawMapPaths();
      if (selectedIso) {
        showCountry(selectedIso, selectedGeoName || t("unknown"));
      } else {
        clearCapitalMarkers();
      }
      zoomBehavior.transform(svg, currentZoomTransform);
    }

    async function init() {
      applyLanguage();
      document.getElementById("data-status").innerText = t("sourceInitial");

      try { await loadGlobalCache(); } catch (_) {
        const s = document.getElementById("data-status");
        s.classList.add("warn");
        s.innerText = t("sourceCacheFailed");
      }

      const map = await fetchJsonFromUrls(WORLD_GEOJSON_URLS);
      mapFeatures = map.features || [];
      document.getElementById("loading").style.display = "none";
      updateProjectionAndSize();

      mapLayers.forEach((layer, idx) => {
        layer.attr("transform", `translate(${tileOffsets[idx] * worldWidth},0)`);
        layer.selectAll("path").data(mapFeatures).enter().append("path")
          .attr("class", "country")
          .attr("d", geoPath)
          .attr("fill", d => baseColor(iso3(d)))
          .on("mouseover", function(_e, d) {
            if (canonicalIso(iso3(d)) !== selectedIso) d3.select(this).attr("fill", hoverColor(iso3(d)));
          })
          .on("mouseout", function(_e, d) {
            if (canonicalIso(iso3(d)) !== selectedIso) d3.select(this).attr("fill", baseColor(iso3(d)));
          })
          .on("click", function(_e, d) {
            selectedIso = canonicalIso(iso3(d));
            selectedGeoName = getGeoDisplayName(iso3(d), d.properties?.name || t("unknown"));
            const rawIso2 = (d.properties?.iso_a2 || "").toUpperCase();
            selectedIso2 = selectedIso === "CHN" ? "CN" : (rawIso2 && rawIso2 !== "-99" ? rawIso2 : iso3ToIso2(selectedIso));
            clearCapitalMarkers();
            syncSelectionStyles();
            playUiClickSfx();
            showCountry(selectedIso, selectedGeoName);
          });
      });

      svg.call(zoomBehavior);
      window.addEventListener("resize", handleResize);
    }

    const langSelect = document.getElementById("language-select");
    window.addEventListener("pointerdown", () => { ensureClickAudio(); }, { once: true });
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => activateTab(btn.dataset.tab));
    });
    const browserLang = (navigator.language || "").toLowerCase();
    if (browserLang.startsWith("en")) currentLang = "en";
    langSelect.value = currentLang;
    langSelect.addEventListener("change", async e => {
      currentLang = e.target.value === "en" ? "en" : "zh";
      applyLanguage();
      Object.keys(globalCountryCache).forEach(k => delete globalCountryCache[k]);
      Object.keys(detailCache).forEach(k => delete detailCache[k]);
      try {
        await loadGlobalCache();
      } catch (_) {
        const s = document.getElementById("data-status");
        s.classList.add("warn");
        s.innerText = t("sourceCacheFailed");
      }
      if (selectedIso) {
        await showCountry(selectedIso, selectedGeoName || t("unknown"));
      } else {
        document.getElementById("data-status").innerText = t("sourceInitial");
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!audioCtx) return;
      if (document.hidden) audioCtx.suspend().catch(() => {});
    });

    init().catch(err => {
      document.getElementById("loading").innerText = t("loadingFailed");
      console.error(err);
    });
  </script>
</body>
</html>
