<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNO 风格交互式世界地图</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    :root {
      --bg: #030808;
      --panel-bg: rgba(4, 10, 10, 0.95);
      --main: #8ed8d8;
      --sub: #5d9e9e;
      --line: #458b8b;
      --text: #e0f8f8;
      --warn: #ff9a6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--main);
      font-family: "Courier New", Courier, monospace;
      overflow: hidden;
      user-select: none;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 999;
    }

    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 32px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--line);
      background: rgba(4, 10, 10, 0.9);
      font-family: 'VT323', monospace;
      font-size: 22px;
      z-index: 10;
      justify-content: space-between;
      gap: 10px;
    }

    .top-bar-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lang-select {
      background: rgba(4, 10, 10, 0.95);
      color: var(--text);
      border: 1px solid var(--line);
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      padding: 2px 6px;
      height: 24px;
    }

    #map-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      overflow: hidden;
    }

    .country {
      stroke: var(--line);
      stroke-width: 0.5;
      transition: fill .15s ease, filter .15s ease;
    }

    .country:hover {
      filter: drop-shadow(0 0 5px var(--main));
      stroke-width: 1;
    }

    .country.selected {
      stroke: var(--text);
      stroke-width: 1.5;
    }

    .ui-panel {
      position: absolute;
      right: 20px;
      top: 48px;
      width: 560px;
      max-height: calc(100vh - 68px);
      overflow: auto;
      background: var(--panel-bg);
      border: 2px solid var(--line);
      box-shadow: inset 0 0 15px rgba(69, 139, 139, .5), 0 0 20px rgba(0, 0, 0, .8);
      padding: 16px;
      display: none;
      z-index: 100;
    }

    .ui-header {
      font-size: 24px;
      color: var(--text);
      text-shadow: 0 0 5px var(--main);
      text-align: center;
      border-bottom: 2px dashed var(--line);
      padding-bottom: 8px;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .panel-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .tab-btn {
      border: 1px solid var(--line);
      background: rgba(4, 18, 18, 0.75);
      color: var(--sub);
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
    }
    .tab-btn.active {
      color: var(--text);
      border-color: var(--main);
      box-shadow: inset 0 0 8px rgba(142, 216, 216, 0.25);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 14px;
    }
    .stats-parliament-wrap {
      display: flex;
      gap: 12px;
      align-items: stretch;
      margin-bottom: 10px;
    }
    .stats-col {
      width: 40%;
      min-width: 0;
    }
    .stats-col .info-row {
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stats-col .info-label {
      width: 96px;
      flex: 0 0 96px;
    }
    .stats-col .info-value {
      text-align: left;
      flex: 1 1 auto;
    }
    .parliament-col {
      width: 60%;
      min-width: 0;
    }
    .parliament-col .parliament-container {
      margin: 0;
    }

    .info-label { color: var(--sub); }
    .info-value { color: var(--text); font-weight: bold; text-align: right; }
    .label-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      text-align: center;
      margin-right: 6px;
      color: #587676;
      vertical-align: -2px;
    }
    .label-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .flag-party-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 8px;
    }
    .leadership-wrap {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      align-items: stretch;
    }
    .leadership-main {
      width: 66%;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .country-photo-card {
      width: 34%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      background: transparent;
      min-height: 100%;
      margin-top: 14px;  /* 添加这一行，数值可以根据你的需要微调，比如 8px, 15px 等 */
    }
    .country-photo-img {
      width: 100%;
      height: 262px;
      min-height: 262px;
      flex: 0 0 auto;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #051010;
    }
    .country-photo-title {
      margin-top: 6px;
      font-size: 12px;
      color: var(--sub);
      text-align: center;
    }
    .country-photo-name {
      margin-top: 3px;
      color: var(--text);
      font-size: 12px;
      text-align: center;
      line-height: 1.3;
      min-height: 30px;
    }
    .flag-party-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 50%;
    }
    .flag-party-img {
      width: 112px;
      height: 72px;
      object-fit: contain;
    }
    .flag-party-img.flag {
      border: 1px solid var(--line);
      object-fit: cover;
    }
    .flag-party-title {
      margin-top: 5px;
      font-size: 12px;
      color: var(--sub);
    }
    .flag-party-name {
      margin-top: 2px;
      color: var(--text);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
      text-align: center;
    }

    .leaders-container {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .leader-card {
      width: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .leader-img {
      width: 120px;
      height: 160px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #051010;
      filter: brightness(0.78) contrast(1.18) saturate(0.7);
    }

    .leader-title { font-size: 12px; color: var(--sub); margin-top: 6px; }
    .leader-name { font-size: 14px; color: #fff; text-align: center; margin-top: 2px; }

    .parliament-container {
      margin: 12px 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      border: 1px solid rgba(69, 139, 139, 0.3);
      padding: 8px;
      background: transparent;
      margin-top: -100px;
    }
    .parliament-layout {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    #parliament-chart {
      width: 100%;
      height: 200px;
      margin-top: -70px;
      margin-left: 20px;
    }

    .party-tooltip {
      position: fixed;
      z-index: 1200;
      max-width: 280px;
      padding: 8px;
      background: rgba(6, 22, 22, 0.9);
      border-left: 3px solid var(--line);
      border: 1px solid rgba(142, 216, 216, 0.35);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
      font-size: 13px;
      display: none;
      pointer-events: none;
    }

    .desc {
      margin-top: 0;
      font-size: 13px;
      color: #a0caca;
      line-height: 1.5;
      text-align: justify;
      padding: 10px;
      background: rgba(69, 139, 139, 0.1);
      border-left: 3px solid var(--main);
      min-height: 98px;
      width: 100%;
    }

    .status { margin-top: 8px; font-size: 12px; color: var(--sub); }
    .status.warn { color: var(--warn); }
    .economy-chart {
      width: 100%;
      border: 1px solid rgba(69, 139, 139, 0.3);
      background: rgba(69, 139, 139, 0.04);
      padding: 8px;
    }
    .eco-chart-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .eco-item {
      border: 1px solid rgba(69, 139, 139, 0.22);
      background: rgba(3, 10, 10, 0.35);
      padding: 4px;
    }
    .eco-item-title {
      font-size: 11px;
      color: var(--sub);
      margin: 0 0 2px 2px;
    }
    .eco-item svg {
      width: 100%;
      height: 120px;
      display: block;
    }
    .economy-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--sub);
    }
    .mil-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .mil-card {
      border: 1px solid rgba(69, 139, 139, 0.32);
      padding: 6px;
      background: rgba(69, 139, 139, 0.05);
      font-size: 12px;
    }
    .mil-chart {
      width: 100%;
      border: 1px solid rgba(69, 139, 139, 0.3);
      background: rgba(69, 139, 139, 0.04);
      padding: 8px;
    }
    .mil-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--sub);
    }

    .loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'VT323', monospace;
      font-size: 28px;
      color: var(--text);
      z-index: 20;
    }
    .capital-pulse-ring {
      opacity: 0.8;
    }

    /* 自定义滚动条样式 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <div class="top-bar">

    </div>

      "NAM": "南部非洲的国家、矿产资源、政治的稳定——纳米比亚在发展中。温得和克的整洁，矿产的出口，经济的多元化；政治的稳定，与邻国的关系。这个国家如何在资源开发与可持续发展中找到平衡？",
      "BWA": "南部非洲的国家、钻石资源、政治的稳定——博茨瓦纳是非洲的成功故事。哈博罗内的发展，钻石的出口，经济的多元化；政治的稳定，与邻国的关系。这个国家如何在资源依赖与经济多元化中找到平衡？",
      "LSO": "南部非洲的小国、农业经济、政治的稳定——莱索托在发展中。马塞卢的平静，农业的重要性，经济的挑战；政治的稳定，与南非的关系。这个国家如何在有限的资源中实现发展？",
      "SWZ": "南部非洲的小国、农业经济、君主制的统治——斯威士兰在传统与现代中平衡。姆巴巴内的发展，农业的重要性，政治的保守性；与邻国的关系，经济的挑战。这个国家如何在传统与发展中找到平衡？",
      "CHL": "安第斯山脉的狭长国度曾是新自由主义的实验室。然而，社会不平等的暗流最终引爆了街头的怒火。新宪法的难产与左右翼的极化对立，让圣地亚哥的政治钟摆在绝望与激进间剧烈摇摆。皮诺切特的幽灵仍未远去，而变革者已在现实的高墙前碰壁。铜矿的财富未能抚平社会的裂痕，智利的未来依旧在迷雾中穿行。",
      "COL": "毒品卡特尔的阴影、游击队的余烬、深植的社会不平等——哥伦比亚的历史是一部暴力与抗争的交响曲。波哥大的权力走廊里，旧势力的根基依然深厚；亚马逊的砍伐与农村的贫困考验着和平协议的脆弱底线。这片魔幻现实主义的土地，仍在寻找真正的平静。",
      "VEN": "拥有世界最大的石油储量，却陷入了史无前例的崩溃。加拉加斯的权力依旧被牢牢掌控，制裁、恶性通胀与数百万人的逃离掏空了国家的元气。反对派的抗争在铁腕与疲惫中式微。在这个被黑金诅咒的国度，玻利瓦尔革命的余辉只剩下空洞的口号与黯淡的街灯。",
      "CUB": "加勒比海的红色堡垒，革命元勋的时代已经落幕。面对长达半个多世纪的封锁，哈瓦那的街头依然行驶着斑驳的老爷车；然而，互联网的微光与年轻一代的觉醒正静水流深地冲击着体制。物资短缺依旧是日常，在这个时间仿佛停滞的岛屿上，变革的暗流已被不可避免地激活。",
      "PER": "安第斯山脉的动荡之源。频繁的总统弹劾与抗议让利马的总统府走马灯般更换主人。原住民的边缘化与首都精英的割裂，让整个国家陷入长期的政治瘫痪。印加帝国的后裔们在腐败与通胀中挣扎，找不到能够统合国家的基石。",
      "CHE": "阿尔卑斯山脉中的中立堡垒，全球隐秘财富的最终避风港。伯尔尼的直接民主与共识政治让它在动荡的欧洲维持着令人艳羡的超然。然而，随着地缘政治重塑与大国竞争加剧，保持绝对中立的代价日益高昂；对移民的警惕与西方制裁体系的施压，正逐渐侵蚀这个山地联邦的古老基石。",
      "AUT": "曾经的哈布斯堡帝国中心，如今在欧洲的十字路口徘徊。维也纳的古典荣光难掩政治的右转，极右翼的崛起让传统政党的共识摇摇欲坠。通胀的压力、能源的焦虑、以及对移民的排斥，正重塑着这个国家的政治版图。中立的承诺在战火纷飞的欧洲显得愈发微妙。",
      "BEL": "欧盟的心脏，却也是一个在分裂边缘摇摇欲坠的王国。弗拉芒人与瓦隆人的语言与经济鸿沟，让布鲁塞尔的组阁往往演变为漫长而痛苦的马拉松。移民聚居区的治安恶化与极右翼的逼近，考验着这个复杂联邦的生存韧性。",
      "IRL": "昔日的凯尔特之虎，依靠低税率吸引了全球科技巨头的驻扎。但在跨国公司的光鲜数据背后，是普通人难以承受的住房危机与公共服务短缺。随着新芬党的崛起与英国脱欧的余波，爱尔兰统一的幽灵再次在岛上游荡，挑战着现有的政治格局。",
      "SRB": "巴尔干半岛的火药桶余烬未熄。贝尔格莱德的政客们在布鲁塞尔的资本与莫斯科的传统友谊间走着危险的钢丝。科索沃的伤疤不时作痛，大塞尔维亚的民族主义幽灵仍在街头游荡。夹在东西方新冷战的断层线上，巴尔干之虎的咆哮中夹杂着深深的无力感。",
      "BLR": "欧洲最后的铁幕残影。明斯克在2020年的动荡后，国家的命运已与莫斯科深度且不可逆地绑定。西方的极限制裁与经济的停滞让这里成为冷战前线的活化石。在这个被时间遗忘的角落，任何变革的希望都被重重冰封。",
      "PRK": "三八线以北的隐士王国，绝对的统治在核武器的冷光中固若金汤。平壤的阅兵式展示着令人生畏的导弹，而国家却在极限制裁与孤立中艰难维系。在这个信息真空的国度，震耳欲聋的口号掩盖了真实的饥寒。它是冷战遗留的最后一块冰川。",
      "TWN": "东亚地缘政治的最前线，全球半导体产业链的脆弱心脏。台北的民主活力与海峡对岸庞大的军事压力形成令人窒息的对比。两大阵营的博弈交织着深层的焦虑；在这个西太平洋的“不沉航母”上，维持现状的钢丝正变得越来越细，阴云时刻牵动着世界的神经。",
      "NZL": "南太平洋的宁静岛国，以其清新的自然与进步的政治著称。然而，惠灵顿也未能幸免于全球化的阵痛。通货膨胀、住房危机以及对原住民权利的争论，让这个被视为避风港的国家出现了裂痕。在逃避世界喧嚣的同时，他们发现自己仍被卷入了太平洋的大国博弈之中。",
      "KAZ": "中亚广袤的草原之国，处于俄罗斯与中国两大巨头之间。“一月风暴”的余波让阿斯塔纳试图在旧有寡头与新秩序间寻找平衡；丰富的油气资源是其立足的筹码，但地缘政治的压力如影随形。未来的命运，取决于能否在多极世界中维持精妙的走钢丝艺术。",
      "AFG": "帝国的坟场。二十年的战争与西方强加的民主实验最终以喀布尔的仓皇撤退告终。塔利班重新入主，将国家拉回了神权统治的严冬。经济崩溃、女性被从公共生活中抹除、国际社会的彻底孤立；这片饱受蹂躏的干旱土地，依然被军阀、宗教与无尽的贫困死死绑架。",
      "DZA": "北非的能源巨头。阿尔及尔的军方与政治精英构成的“体制”依然掌控着国家的命脉。丰富的天然气使其在欧洲能源危机中获得了极大的筹码，但国内居高不下的青年失业率与对自由的渴望，始终是这片沙漠之下的暗流。",
      "MAR": "扼守直布罗陀海峡的王国。拉巴特的王室维持着微妙的平衡，在传统与现代化转型中稳步推进。对西撒哈拉的控制强化了其民族主义叙事，但城乡差距、干旱带来的农业危机，以及周边地缘的紧张局势，仍是悬在头顶的达摩克利斯之剑。",
      "SDN": "尼罗河畔的悲歌。短暂的文官政府实验在枪炮声中灰飞烟灭，苏丹武装部队与快速支援部队的血腥内战让喀土穆沦为废墟。无数平民流离失所，国家在军阀的割据与外部势力的干涉中四分五裂，和平似乎遥不可及。",
      "BOL": "安第斯山脉的内陆国。拥有世界最大的锂矿储量，却深陷左翼内部的权力斗争。莫拉莱斯的幽灵与现政府的决裂，让拉巴斯的街头再次成为抗议的海洋。资源民族主义未能带来普遍繁荣，反而成为了新地缘博弈的筹码。",
      "ECU": "赤道之国正经历前所未有的治安危机。曾经相对平静的避风港，如今沦为跨国贩毒集团的火并战场。基多的政客们在频繁的弹劾与提前大选中疲于奔命，而瓜亚基尔的港口则被暴力阴影笼罩。铁腕手段能带来短暂的平静，但难以根除深层的溃烂。",
      "URY": "南美的瑞士，罕见的稳定绿洲。在周围邻国陷入民粹与动荡的漩涡时，蒙得维的亚依然保持着令人羡慕的民主韧性与高福利体系。然而，人口老龄化与经济增长的瓶颈，正在悄然考验着这套温和共识政治的极限。",
      "BGR": "巴尔干的边缘，欧盟最贫穷的成员国。索菲亚的政坛陷入了无休止的选举循环，破碎的议会与根深蒂固的寡头腐败让任何改革尝试都举步维艰。亲俄的情结与对欧洲资金的依赖，让这个国家在新冷战的裂痕中左右为难。",
      "HRV": "亚得里亚海的明珠，依靠绝美的海岸线吸引着全欧洲的游客。但在旅游业繁荣的表象下，是年轻劳动力的持续外流和对单一经济的严重依赖。萨格勒布的右翼政府在融入欧元区后显得更加自信，但巴尔干战争的旧伤疤依然在社会的潜意识中隐隐作痛。",
      "LTU": "波罗的海的坚定前哨。面对东部巨大的地缘压力，维尔纽斯选择了最强硬的姿态，不仅是北约的积极先锋，更在远东外交上频频触碰大国的逆鳞。这种不对称的强硬赢得了西方的赞誉，但也让这个小国时刻处于如履薄冰的高度紧张之中。",
      "UZB": "中亚的心脏地带，人口最多的共和国。在经历了漫长的封闭与铁腕统治后，塔什干正在推行谨慎的“新乌兹别克斯坦”改革。国门渐开，外资涌入，但在光鲜的基建背后，权力的逻辑并未发生根本性改变。它在俄罗斯、中国与西方之间游刃有余，试图重现丝绸之路的荣光。",
      "GEO": "高加索的破碎阳台。第比利斯的街头永远不缺挥舞欧盟旗帜的抗议者，但执政党“格鲁吉亚梦想”却在务实与亲俄的边缘危险试探。阿布哈兹与南奥塞梯的伤口依旧流血，欧洲的梦想与地缘的现实在这里激烈碰撞，撕裂着这个盛产美酒的国度。",
      "AZE": "里海的火焰之国。凭借丰厚的油气收入与土耳其的鼎力支持，巴库在纳卡战争中以压倒性的军事优势重塑了高加索的版图。阿利耶夫家族的统治固若金汤，但在民族主义的狂欢褪去后，如何在中俄伊三大地缘巨头之间维持战略平衡，将是新的考验。",
      "ARM": "亚拉拉特山阴影下的悲情国度。接连的军事挫败与领土丧失，让埃里温陷入了深深的集体创伤。传统的保护伞俄罗斯显得冷漠而无力，向西方靠拢的尝试又远水解不了近渴。在这个强敌环伺的高加索孤岛上，生存本身就已经耗尽了所有的力气。",
      "MNG": "夹在中俄两大核邻国之间的广袤草原。乌兰巴托的政客们精通“第三邻国”外交，试图用民主体制和矿产资源吸引美欧的目光以对冲地缘压力。然而，煤炭腐败丑闻不时点燃民众的怒火，极度依赖邻国港口与能源的现实，让这个游牧民族的后裔难以真正快马扬鞭。",
      "NPL": "喜马拉雅山麓的内陆佛国。加德满都的政局如同山间的季风般变幻莫测，共产党各派系与国大党之间的权力游戏循环往复。它小心翼翼地在印度与中国两个大国之间寻找平衡，但贫困、青年外流以及基础设施的落后，让这座雪山之国的现代化之路步履维艰。",
      "AGO": "西南非的石油巨兽。漫长的内战虽然已经远去，但罗安达的光鲜摩天大楼与郊区无边无际的贫民窟形成了刺眼的对比。执政党MPLA紧紧把控着石油美元的流向，尽管新总统试图推行反腐与改革，但既得利益集团的根基深不可测，底层民众依然在黑金的诅咒中挣扎。",
      "SOM": "几乎成为“失败国家”代名词的非洲之角。摩加迪沙的中央政府犹如脆弱的孤岛，勉强在非盟维和部队的保护下运转。青年党的恐怖袭击如影随形，地方部族武装割据一方，索马里兰的实质独立更是让国家统一遥遥无期。在这片干旱的土地上，无政府状态的幽灵依然盘旋。",
      "MLI": "萨赫勒地带的动荡风暴眼。连续的军事政变让巴马科与西方彻底决裂，法国驻军黯然撤离，取而代之的是俄罗斯瓦格纳雇佣兵的冷酷身影。北部的图阿雷格分裂势力与极端伊斯兰武装依然在广袤的沙漠中肆虐。军政府试图用激进的主权叙事掩盖安全局势的崩坏，但前路依旧一片血红。"
    };
    const LOCAL_COUNTRY_DESCRIPTIONS_EN = {
      "USA": "The US remains the economic and military pillar of the free world: Silicon Valley's innovation, Wall Street's capital flows, and Hollywood's cultural exports—these advantages have not yet dissipated. However, the two-party system has torn Congress into evenly matched halves, social polarization has penetrated neighborhoods and dining tables, and every Supreme Court ruling threatens to ignite new divisions. If the democratic system loses its self-healing ability amidst the clamor, how will this beacon that once illuminated the world light its own path?",
      "CHN": "A massive market of 1.4 billion people, the manufacturing capacity of the world's factory, high-speed rail, and digital payment infrastructure—China's rise was once seen as the miracle of the 21st century. But power is highly concentrated in one party, and the image of People's Congress deputies raising their hands in unison forms an ironic contrast with the reality of closed-door decision-making by the Politburo Standing Committee; the real estate bubble, local debt, and the shadow of an aging population are gathering. Can this behemoth complete its transition while maintaining stability? The future is full of variables.",
      "RUS": "Vast territory, abundant oil and gas resources, and a nuclear arsenal inherited from the Soviet Union—Russia remains a force to be reckoned with. But the Duma under strongman rule is merely a rubber stamp, with real decisions made deep within the Kremlin; sanctions and war have dragged the economy into a quagmire, young talent is draining away, and opposition to the West is increasingly solidifying. The former superpower is searching for its position in the wilderness, and the harsh winter may have just begun.",
      "DEU": "The economic engine of the EU, precision manufacturing, and the post-war democratic miracle—Germany was once a symbol of stability. However, the far-right has seen a surge in parliamentary seats, and the ghost of Weimar looms faintly; the growing pains of the energy transition, controversies over immigrant integration, and divergences with France over leading Europe are eroding consensus. If mainstream parties fail to address public anxiety, will the fortress of democracy crack from within?",
      "GBR": "London's financial center, the academic traditions of Oxford and Cambridge, and the cultural influence of the Anglosphere—Britain's foundation remains. But the aftermath of Brexit has yet to settle, the centrifugal forces of Scotland and Northern Ireland are growing day by day, and how long the honeymoon period after the Labour Party's landslide victory will last remains unknown. The future of the United Kingdom hangs in the balance; can the bells of Westminster continue to toll for a united kingdom?",
      "FRA": "Nuclear power status, the core of the EU, culture, and soft power—France remains proud. However, three camps stand divided in the National Assembly with no absolute majority, and the institutions of the Fifth Republic are operating amidst unprecedented fragmentation; street anger sparked by pension reforms, the alienation of suburban immigrants, and the steady advance of the far-right cast a shadow over Paris's halo. Can the Republic find a new balance amidst the tearing?",
      "JPN": "The third-largest economy, cutting-edge technology, and a well-ordered society—Japan was once an unshakable benchmark. But the LDP has lost its parliamentary majority for the first time, and the era of one-party dominance may be ending; an aging population with low birth rates is eroding the labor force at an alarming speed, relations with China and South Korea are tense, and the geopolitical dilemma caught between China and the US is becoming increasingly prominent. The Emperor's nation is searching for a new course in uncharted waters.",
      "ITA": "A G7 member, Europe's third-largest economy, and unparalleled cultural heritage—Italy's foundation cannot be underestimated. Under the right-wing coalition's rule in Rome, the democratic experiment in Mussolini's homeland continues; the chasm between North and South, a mountain of public debt, the shadow of the Mafia, and the games between the Five Star Movement and traditional parties—the political weathervane is always swinging. Can Europe's southern gate hold onto stability?",
      "ESP": "A tourist paradise, a pioneer in renewable energy, and a bridge between Latin America and Europe—Spain has its unique advantages. But a parliament split between left and right, the independence demands of Catalonia and the Basque Country, the chronic illness of unemployment (especially youth unemployment), and the rise of the far-right fill the dialogue between Madrid and Barcelona with tension. Franco's legacy has long faded, but building consensus remains arduous.",
      "IND": "The world's largest democracy, a young population, and a booming tech industry—India is pinned with high hopes. In the BJP-dominated parliament, the tension between religious nationalism and secular pluralism is evident; the shadow of the caste system, extreme wealth disparity, the blood feud with Pakistan, and domestic religious conflicts are all testing the resilience of this diverse nation. Can New Delhi's clamor be transformed into lasting prosperity?",
      "BRA": "The Amazon rainforest, an agricultural powerhouse, and Latin America's largest market—Brazil's potential is unquestionable. However, the street clashes between supporters of Lula and Bolsonaro, fragile and fickle alliances in Congress, deforestation versus indigenous rights, and the violence and corruption scandals in the favelas mean that Rio's sunshine cannot hide the political gloom. Can the South American giant break free from its recurring cycle of turmoil?",
      "CAN": "Vast territory, abundant resources, and a diverse, inclusive society—Canada is the straight-A student of the Western world. Liberals and Conservatives alternate in power, and while Quebec separatism has waned, it has never truly disappeared; the housing crisis and rising cost of living are eroding the middle class's sense of security. Ottawa's calm contrasts with the clamor of its southern neighbor, but can such tranquility endure amidst global shifts?",
      "AUS": "Rich in minerals and agriculture, stable institutions, and a diverse immigrant society—Australia was once the 'Lucky Country'. Labor is in power, but climate change-induced fires and floods, historical debts regarding indigenous rights, subtle relations with China, and the collapse of housing affordability are tearing at the consensus. From Sydney to Perth, can the halo of the lucky country withstand the mounting uncertainties?",
      "KOR": "Samsung and Hyundai, K-pop and the Korean Wave, a crucial node in the semiconductor supply chain—South Korea's hard and soft power are remarkable. But the wound of the peninsula's division has never healed, and the confrontation between the Democratic Party and the People Power Party reflects the identity anxiety of an entire nation; low birth rates, the chasm between chaebols and ordinary people, and the military standoff with North Korea. Under Seoul's neon lights, the dream of unification intertwines with the weight of reality.",
      "NLD": "The Port of Rotterdam, tulips and windmills, and a tradition of a tolerant society—the Netherlands was once a beacon of liberalism. The rise of the far-right, protracted cabinet formation negotiations, tensions between immigrants and natives, the housing crisis, and farmer protests triggered by nitrogen emissions are putting Amsterdam's liberal traditions under populist pressure. Can the land of tulips defend its open values amidst the fragmentation?",
      "SWE": "The flagship of the Nordic welfare model, IKEA and Ericsson, and a high quality of life—Sweden was once the paradigm of social democracy. The standoff between the Social Democrats and the far-right has shattered long-standing political tranquility; controversies over immigrant integration, brewing security issues, and the strategic shift after joining NATO. Stockholm's welfare state is redefining itself in crisis, and the future is full of variables.",
      "POL": "The largest economy in Central and Eastern Europe, the success story of EU eastward expansion, and a resilient nation—Poland's rise is striking. Warsaw, dominated by the Law and Justice party, wrestles with Brussels over the rule of law versus sovereignty; controversies over judicial reform, delicate relations with Ukraine, and debates over historical issues. From Gdańsk to Kraków, the weight of history remains, and the road ahead is not smooth.",
      "TUR": "A strategic chokepoint spanning two continents, NATO's second-largest army, and an emerging market—Turkey's position is unique. Erdogan has ruled for a long time, the AKP controls parliament, and the lines between secularism and religion have long blurred; raging inflation, a plunging Lira, the entanglement of the Kurdish issue, and a hot-and-cold relationship with the West. Istanbul spans Eurasia, but where will Ankara's power experiment lead the nation?",
      "MEX": "Latin America's second-largest economy, geopolitically adjacent to the US, and rich in cultural heritage—Mexico has massive potential. Mexico City, dominated by MORENA, intertwines with the drug war and the immigration crisis, as the President's 'Fourth Transformation' advances amidst controversy; cartel violence, chronic corruption, and complex relations with the US. Cancún's sunshine forms a cruel contrast with the blood pools of Juárez.",
      "ARG": "The granary of the Pampas, a well-educated population, and profound cultural heritage—Argentina shouldn't be struggling like this. The libertarian Milei has entered the Casa Rosada, and the shock therapy experiment is tearing society apart; the fate of the peso is tightly bound to the success or failure of reforms, while inflation and poverty rates remain stubbornly high. Can South America's granary find a way out in yet another cycle?",
      "ZAF": "Africa's most developed economy, rich in minerals, and the legacy of reconciliation left by Mandela—South Africa was once full of hope. The ANC has lost its absolute parliamentary majority; corruption and inequality are eroding the colors of the Rainbow Nation; power crises, high unemployment, and the undercurrents of racial tension. From Cape Town to Johannesburg, can Mandela's legacy be passed down through overwhelming challenges?",
      "IRN": "Persian civilization, oil reserves, and a strategic location—Iran's weight cannot be ignored. Theocracy and popular will are wrestling; principlists control parliament, but young faces on the streets express their dissatisfaction through silence and votes; economic hardship under sanctions, hostility with Israel, and the unresolved nuclear issue. Beneath the domes of Tehran, the seeds of change are sprouting, but no one knows when spring will arrive.",
      "ISR": "A hotbed for high-tech innovation, powerful military strength, and the homeland of the Jewish people—Israel's achievements are astonishing. In the post-Netanyahu era in Jerusalem, the standoff between Likud and Yesh Atid continues; the shadow of Gaza, the settlement issue, and the domestic tear between the secular and the religious. The dawn of peace seems further away than ever, and when will the cycle of war and conflict be broken?",
      "EGY": "The cradle of ancient civilization, the Suez Canal, and the demographic center of the Arab world—Egypt's strategic position is irreplaceable. General Sisi's iron fist maintains stability, and the relationship between the military and elected institutions is delicate; economic woes, a population explosion, and the water rights dispute with Ethiopia. By Cairo's Nile, balancing stability and freedom has never been simple; the future looms in the mist.",
      "THA": "The hub of Southeast Asia, a tourist paradise, and traditions of monarchy and Buddhism—Thailand has its unique charm. The three-way game between the monarchy, the military, and the elected government never ceases, as the contest between Pheu Thai and Move Forward plays out simultaneously on Bangkok's streets and in parliamentary corridors; the young generation's thirst for reform and the conservative establishment's backlash form a tug-of-war. The Land of Smiles' future is far from as peaceful as it appears.",
      "VNM": "A rising star in manufacturing, a young labor force, and the vitality of reform—Vietnam is the bright spot of ASEAN. The Communist Party rules absolutely; reformists and conservatives in Ho Chi Minh City and Hanoi wrestle within the party; complex relations with China, South China Sea disputes, and the limits of political openness. The former bustle of Saigon presents a different scene today, but will new prosperity bring more freedom?",
      "IDN": "The world's fourth most populous country, the core of ASEAN, and a diverse archipelagic nation—Indonesia's weight grows daily. In Jakarta, dominated by the PDI-P, the tension between Islam and secularism is evident in Southeast Asia's largest Muslim nation; infrastructure shortfalls, the rise of religious conservatism, and the ambition of relocating the capital. The democratic experiment of the nation of ten thousand islands is still ongoing.",
      "PHL": "A young population, remittances from overseas workers, and an English-language advantage—the Philippines has growth potential. The Marcos family has returned to Malacañang Palace; Manila's democracy struggles between family politics and populism; South China Sea disputes, poverty and inequality, and the fading memories of the EDSA Revolution. Where is this once-colonized nation that embraced democracy heading?",
      "UKR": "Black soil, a military-industrial legacy, and a resilient people—Ukraine has shown admirable will amidst the flames of war. Zelensky's Servant of the People party leads the resistance; Kyiv's parliament and the trenches are equally critical; the massive cost of reconstruction, the chronic illness of corruption, and the uncertainty of Western aid. The war will eventually end, but how will the post-war Ukraine be rebuilt?",
      "ROU": "EU member, Black Sea coast, and a hotbed for IT outsourcing—Romania is advancing as it catches up. The tug-of-war between the Social Democrats and Liberals continues; Bucharest's corruption scandals intertwine with EU funds; controversies over judicial reform, population drain, and relations with Hungary. Eastern Europe's democracy is still growing, but the process is full of growing pains.",
      "CZE": "The industrial heart of Central Europe, leading GDP per capita, and relatively stable institutions—the Czech Republic was once seen as a model of transition. The rise of Action of Dissatisfied Citizens (ANO) shook Prague, forming a new landscape with traditional left and right wings; friction with the EU, the impact of the Russo-Ukrainian war, and social aging. The heart of Central Europe beats endlessly, but its rhythm is not always steady.",
      "HUN": "In Orban-dominated Budapest, the experiment of 'illiberal democracy' has continued for years; Fidesz controls parliament, and relations with Brussels are tense. Economic resilience, a hardline stance on immigration, and a 'Look East' strategy—Hungary's path is unique. Can such an experiment last long-term? The EU's patience is wearing thin.",
      "NOR": "Oil wealth, a sovereign wealth fund, and high welfare—Norway is the paradigm of a resource-rich state. The oil-rich nation's green transition advances in Oslo, with the Labor and Conservative parties wrestling; the North Sea's black gold will eventually dry up, and the melting Arctic ice brings opportunities and geopolitical risks. Can the Nordic oil kingdom turn around successfully?",
      "DNK": "In Social Democrat-led Copenhagen, debates over the welfare state and immigration policy tear at this nation of Viking descendants; the tension between strict immigration policies and inclusive values, and skepticism towards the EU. Can the Danish model be maintained under the pressure of diversification?",
      "FIN": "In Helsinki after joining NATO, relations with Moscow have never been more delicate; leading education, advanced tech, and the roots of forestry and paper—Finland has its advantages. The long border with Russia, memories of the Winter War, and energy transition. The Nordic's eastern outpost stands at the forefront of the geopolitical chessboard.",
      "PRT": "The rise of the Chega party shocked Lisbon, as the traditional duel between the Socialists and Social Democrats met the impact of populism; the trauma of the debt crisis, reliance on tourism, and the drain of young demographics. The western tip of the Iberian Peninsula is searching for a new direction.",
      "GRC": "In Athens, dominated by New Democracy, the wounds of the debt crisis have not yet fully healed; the blue waves of the Aegean Sea and Brussels' tight grip are equally real. The recovery of tourism, the shadow of debt, and tensions with Turkey. Can the cradle of Western civilization regain its glory in the 21st century?",
      "SAU": "Oil wealth, the holy cities of Islam, and the leader of the Gulf region—Saudi Arabia's influence is indisputable. Crown Prince Mohammed's reforms are changing this conservative kingdom, from allowing women to drive to developing tourism; but power is highly concentrated in the royal family, the sectarian divide between Shia and Sunni, and regional competition with Iran. Riyadh's skyscrapers coexist with desert traditions, and the future of this oil kingdom is full of variables.",
      "IRQ": "The cradle of Mesopotamian civilization, abundant oil resources, and a geopolitical crossroads—Iraq's fate is ill-starred. A Shia-dominated government, Kurdish autonomy, Sunni marginalization, and the shadow of sectarian conflicts and terrorism; the difficulty of post-war reconstruction and complex relations with neighbors. Baghdad's ancient ruins intertwine with modern chaos; can this country emerge from the turmoil?",
      "SYR": "An ancient civilization, a strategic location, and ongoing conflict—Syria's tragedy continues. The Assad regime controls most of the territory, but the wounds of war are hard to heal; the refugee crisis, economic collapse, and international intervention. Damascus's history coexists with the ruins of war; where does the future of this country lie?",
      "YEM": "The impoverished corner of the Arabian Peninsula, an ongoing civil war, and a humanitarian crisis—Yemen's suffering is heartbreaking. The Houthis face off against the Saudi-led coalition; food shortages and rampant disease; external intervention and the difficulty of peace talks. Sana'a's ancient architecture contrasts sharply with the destruction of war; when will this country see peace?",
      "LBN": "The financial center of the Middle East, a diverse society, and a fragile political balance—Lebanon is on the brink of collapse. The deadlock of sectarian politics, economic collapse, and the trauma of the Beirut port explosion; complex relations with Syria and the influence of Hezbollah. Beirut's former prosperity and current chaos; can this country find a path to rebirth?",
      "JOR": "The continuation of the Hashemite dynasty, a relatively stable oasis, and the importance of the Jordan River—Jordan seeks balance in a turbulent region. The stability of the monarchy, the burden of Palestinian refugees, and the peace treaty with Israel; economic challenges and water shortages. Amman's modernization coexists with desert traditions; how does this country maintain stability amid regional upheaval?",
      "KWT": "Oil wealth, a welfare state, and a member of the GCC—Kuwait seeks balance in wealth. The stability of the monarchy, the balance of power between parliament and the royal family, and an oil-dependent economy; historical grievances with Iraq and the challenges of regional security. Kuwait City's skyscrapers and the vast desert; what is the future of this oil state?",
      "ARE": "A miracle in the desert, a global financial center, and a diverse society—the UAE's rise is astonishing. Abu Dhabi's oil wealth, Dubai's commercial empire, and a vision of modernization; the stability of the monarchy, the issue of foreign labor, and its role in regional security. Dubai's skyscrapers and desert traditions; how does this country sustain growth?",
      "QAT": "Natural gas wealth, World Cup host, and a rising regional influence—Qatar's story is compelling. The stability of the monarchy, a gas-dependent economy, and the global influence of Al Jazeera; the diplomatic crisis with neighbors and the successful hosting of the World Cup. Doha's modernization and traditional integration; how can this country play a greater role in the region?",
      "OMN": "The history of the Spice Route, a strategic location, and efforts at modernization—Oman stands unique in the Gulf region. The Sultan's stable rule, a neutral foreign policy, and attempts at economic diversification; the importance of its geographical location and relations with Iran. Muscat's ancient port and modern development; how does this country maintain balance amidst change?",
      "PAK": "A nuclear state in South Asia, a massive population, and a long-term standoff with India—Pakistan's challenges are immense. Political turmoil in Islamabad, the military's influence, and economic woes; the Kashmir dispute and the threat of terrorism. Lahore's culture and Karachi's vitality; how can this country achieve stability and development?",
      "BGD": "A nation of the Ganges Delta, a huge population, and economic rise—Bangladesh is changing its image. The crowding and vitality of Dhaka, the boom of the garment industry, and the threat of climate change; political stability and relations with India. How does this country find a balance between population pressure and development needs?",
      "SRI": "The pearl of the Indian Ocean, a diverse society, and post-war reconstruction—Sri Lanka is recovering. Colombo's development, reconciliation between Tamils and Sinhalese, and economic challenges; the impact of the debt crisis and the recovery of tourism. How does this island nation achieve prosperity in peace?",
      "MYA": "The hermit of Southeast Asia, abundant resources, and political shifts—Myanmar's future is full of uncertainty. The junta's rule, the resistance of the democratic movement, and the Rohingya crisis; resource exploitation and relations with neighbors. Yangon's colonial architecture and modern conflicts; when will this country achieve democracy and stability?",
      "CAM": "Home to Angkor Wat, economic growth, and political challenges—Cambodia is moving forward in development. Hun Sen's long rule, the limitations of democracy, and economic growth; the importance of tourism and relations with Thailand. Phnom Penh's development and Siem Reap's culture; how does this country balance stability and reform?",
      "LAO": "The landlocked nation of Southeast Asia, hydropower resources, and developmental challenges—Laos is advancing to catch up. The stability of one-party rule, economic growth, and infrastructure construction; relations with China and environmental challenges. Vientiane's tranquility and rural traditions; how does this country achieve sustainable development?",
      "VTM": "A small country in Southeast Asia, economic openness, and political stability—Vietnam's neighbor is rising. One-party rule, economic growth, and cooperation with ASEAN; the importance of geographical location and relations with China. How does this country find its place in regional competition?",
      "MYS": "A diverse society, economic development, and political shifts—Malaysia is in transition. The diverse society of Malays, Chinese, and Indians, economic diversification, and political democratization; competition with Singapore and cooperation with Indonesia. Kuala Lumpur's skyscrapers and Penang's culture; how does this country achieve harmony and development?",
      "SGP": "A city-state, an economic miracle, and highly efficient governance—Singapore is the paradigm of Asia. Lee Kuan Yew's legacy, economic diversification, and educational success; relations with Malaysia and its role in regional security. How does this little red dot maintain independence and prosperity amidst great power games?",
      "BRN": "Oil wealth, an Islamic monarchy, and a small but rich nation—Brunei develops in peace. The Sultan's rule, an oil-dependent economy, and the welfare state model; cooperation with ASEAN and religious conservatism. How does this country maintain stability in a changing world?",
      "KHM": "An ancient kingdom in Southeast Asia, the history of the Khmer Rouge, and reconstruction efforts—Cambodia is recovering. Hun Sen's rule, economic growth, and tourism development; the legacy of the Khmer Rouge and border disputes with Thailand. The glory of Angkor Wat and modern challenges; how does this country move toward the future?",
      "MDG": "An island nation in Africa, unique ecology, and developmental challenges—Madagascar seeks development. The politics of Antananarivo, unique biodiversity, and economic dependence; the challenge of poverty and the importance of environmental protection. How does this island nation find a balance between development and conservation?",
      "ETH": "A major power in the Horn of Africa, an ancient civilization, and developmental potential—Ethiopia is rising. Prime Minister Abiy's reforms, economic growth, and infrastructure construction; the water rights dispute with Egypt and the challenge of ethnic conflicts. The development of Addis Ababa and the churches of Lalibela; how does this country achieve unity and prosperity?",
      "KEN": "The economic engine of East Africa, a paradise for wildlife, and political challenges—Kenya is developing. Nairobi's modernization, the importance of tourism, and economic growth; political corruption and tribal conflicts. How does this country find a balance between development and governance?",
      "NGR": "Africa's most populous nation, oil resources, and a complex society—Nigeria's potential and challenges coexist. Lagos's vitality, an oil-dependent economy, and religious and tribal conflicts; the threat of Boko Haram and the problem of corruption. How does this country achieve unity and development?",
      "GHA": "A stable country in West Africa, gold resources, and democratic practice—Ghana is the hope of Africa. Accra's development, cocoa and gold exports, and democratic consolidation; economic challenges and youth unemployment. How does this country continue to advance in democracy and development?",

      "MRT": "A small country in West Africa, peanut production, and political stability—Mali is moving forward amidst challenges. Bamako's culture, the importance of agriculture, and the threat of terrorism; international intervention and political stability. How does this country find a balance between security and development?",

      "SLE": "A country in West Africa, diamond resources, and post-war reconstruction—Sierra Leone is recovering. Freetown's reconstruction, the importance of the diamond industry, and the consolidation of peace; economic challenges and social reconstruction. How does this country achieve development in peace?",
      "TOG": "A small country in West Africa, agricultural economy, and political stability—Togo is developing. Lomé's port, the importance of agriculture, and economic challenges; political stability and relations with neighbors. How does this country achieve development with limited resources?",
      "BEN": "A country in West Africa, agricultural economy, and political stability—Benin is developing. Cotonou's port, the importance of agriculture, and economic challenges; political stability and relations with neighbors. How does this country achieve development with limited resources?",
      "NIG": "A country in West Africa, agricultural economy, and political stability—Niger is moving forward amidst challenges. Niamey's development, the importance of agriculture, and the threat of desertification; political stability and relations with neighbors. How does this country achieve development amidst environmental challenges?",
      "CHD": "A country in Central Africa, oil resources, and political turmoil—Chad is moving forward amidst challenges. N'Djamena's development, oil exports, and political instability; tribal conflicts and relations with neighbors. How does this country find a balance between stability and development?",
      "CAF": "A country in Central Africa, rich resources, and political turmoil—The Central African Republic is in crisis. Bangui's chaos, rich resources, and political instability; ongoing conflicts and a humanitarian crisis. How does this country find a way out for peace and development?",
      "COD": "A major power in Central Africa, rich resources, and continuous conflict—The Democratic Republic of the Congo faces immense challenges. Kinshasa's chaos, abundant minerals, and ongoing conflict; a humanitarian crisis and international intervention. How does this country find a balance between resource exploitation and peace?",
      "RWA": "A small country in East Africa, a history of genocide, and a miracle of reconstruction—Rwanda's story is inspiring. Kigali's cleanliness, the memory of the genocide, and economic growth; efforts at national unity and relations with neighbors. How does this country achieve prosperity in the shadow of history?",

      "ZMB": "A country in Southern Africa, copper resources, and economic challenges—Zambia is in transition. Lusaka's development, copper exports, and economic diversification; political stability and relations with neighbors. How does this country find a balance between resource dependence and economic diversification?",
      "ZWE": "A country in Southern Africa, agricultural resources, and economic challenges—Zimbabwe is in transition. Harare's development, the importance of agriculture, and economic woes; political change and relations with neighbors. How does this country find a balance between economic recovery and political stability?",
      "NAM": "A country in Southern Africa, mineral resources, and political stability—Namibia is developing. Windhoek's cleanliness, mineral exports, and economic diversification; political stability and relations with neighbors. How does this country find a balance between resource exploitation and sustainable development?",
      "BWA": "A country in Southern Africa, diamond resources, and political stability—Botswana is Africa's success story. Gaborone's development, diamond exports, and economic diversification; political stability and relations with neighbors. How does this country find a balance between resource dependence and economic diversification?",
      "LSO": "A small country in Southern Africa, agricultural economy, and political stability—Lesotho is developing. Maseru's tranquility, the importance of agriculture, and economic challenges; political stability and relations with South Africa. How does this country achieve development with limited resources?",
      "SWZ": "A small country in Southern Africa, agricultural economy, and monarchical rule—Eswatini balances tradition and modernity. Mbabane's development, the importance of agriculture, and political conservatism; relations with neighbors and economic challenges. How does this country find a balance between tradition and development?",
      "CHL": "The narrow country of the Andes was once a laboratory for neoliberalism. However, the undercurrent of social inequality finally ignited anger on the streets. The difficult birth of a new constitution and the extreme polarization of left and right have caused Santiago's political pendulum to swing wildly between despair and radicalism. Pinochet's ghost has not yet departed, while reformers have hit a wall of reality. The wealth of copper mines has failed to heal the rifts in society, and Chile's future continues to navigate through the fog.",
      "COL": "The shadow of drug cartels, the embers of guerrillas, and deep-rooted social inequality—Colombia's history is a symphony of violence and resistance. In the corridors of power in Bogotá, the roots of the old establishment remain deep; deforestation in the Amazon and rural poverty test the fragile bottom line of the peace agreement. This land of magical realism is still searching for true tranquility.",
      "VEN": "Possessing the world's largest oil reserves, yet plunged into an unprecedented collapse. Power in Caracas remains tightly controlled, while sanctions, hyperinflation, and the flight of millions have hollowed out the nation's vitality. The opposition's resistance is waning amidst iron-fisted rule and exhaustion. In this country cursed by black gold, the afterglow of the Bolivarian Revolution leaves only hollow slogans and dim streetlights.",
      "CUB": "The red fortress of the Caribbean, the era of the founding revolutionaries has drawn to a close. Facing over half a century of blockade, mottled vintage cars still roam the streets of Havana; however, the glimmer of the internet and the awakening of the younger generation are quietly but profoundly impacting the system. Material shortages remain the norm, and on this island where time seems to stand still, the undercurrent of change has been inevitably activated.",
      "PER": "The source of turmoil in the Andes. Frequent presidential impeachments and protests have turned the presidential palace in Lima into a revolving door of leaders. The marginalization of indigenous peoples and the disconnect of the capital's elites have paralyzed the entire nation politically. The descendants of the Inca Empire struggle amidst corruption and inflation, unable to find a cornerstone to unify the country.",
      "CHE": "The neutral fortress in the Alps, the ultimate haven for hidden global wealth. Bern's direct democracy and consensus politics allow it to maintain an enviable aloofness in a turbulent Europe. However, as geopolitics reshape and great power competition intensifies, the cost of absolute neutrality becomes increasingly high; wariness toward immigrants and pressure from the Western sanctions system are gradually eroding the ancient foundation of this mountain confederation.",
      "AUT": "Once the center of the Habsburg Empire, now wandering at the crossroads of Europe. Vienna's classical glory cannot conceal its political rightward shift, and the rise of the far-right leaves the consensus of traditional parties teetering. Inflationary pressures, energy anxiety, and the rejection of immigrants are reshaping the country's political landscape. The commitment to neutrality appears increasingly delicate in a war-torn Europe.",
      "BEL": "The heart of the EU, but also a kingdom teetering on the edge of division. The linguistic and economic chasm between the Flemish and Walloons often turns cabinet formation in Brussels into a long and painful marathon. The deteriorating security in immigrant neighborhoods and the steady approach of the far-right test the survival resilience of this complex federation.",
      "IRL": "The former Celtic Tiger relied on low tax rates to attract the stationing of global tech giants. But behind the glamorous data of multinational corporations lies a housing crisis and public service shortage that ordinary people can hardly bear. With the rise of Sinn Féin and the aftershocks of Brexit, the ghost of Irish reunification once again roams the island, challenging the existing political landscape.",
      "SRB": "The embers of the Balkan powder keg have yet to extinguish. Politicians in Belgrade walk a dangerous tightrope between Brussels' capital and Moscow's traditional friendship. The scars of Kosovo ache from time to time, and the nationalist ghost of Greater Serbia still roams the streets. Caught on the fault line of the new Cold War between East and West, the roar of the Balkan tiger is mixed with a deep sense of powerlessness.",
      "BLR": "The last shadow of the Iron Curtain in Europe. After the turmoil of 2020, the fate of Minsk is deeply and irreversibly tied to Moscow. Western extreme sanctions and economic stagnation have made it a living fossil on the front lines of the Cold War. In this corner forgotten by time, any hope for change has been heavily frozen.",
      "PRK": "The hermit kingdom north of the 38th parallel, absolute rule is impregnable in the cold light of nuclear weapons. Pyongyang's military parades display daunting missiles, while the nation struggles to survive under extreme sanctions and isolation. In this country of an information vacuum, deafening slogans cover up the true hunger and cold. It is the last glacier left over from the Cold War.",
      "TWN": "Merged into China display mode in this map configuration.",
      "NZL": "A tranquil island nation in the South Pacific, known for its pristine nature and progressive politics. However, Wellington has not been immune to the growing pains of globalization. Inflation, a housing crisis, and debates over indigenous rights have caused cracks in this country seen as a safe haven. While escaping the world's clamor, they find themselves still drawn into the great power games of the Pacific.",
      "KAZ": "A vast steppe nation in Central Asia, situated between the two giants of Russia and China. The aftermath of 'Bloody January' has Astana attempting to find a balance between the old oligarchs and the new order; abundant oil and gas resources are its bargaining chips, but geopolitical pressure follows it like a shadow. Its future fate depends on whether it can maintain the delicate art of tightrope walking in a multipolar world.",
      "AFG": "The graveyard of empires. Twenty years of war and the democratic experiment imposed by the West finally ended with the hasty retreat from Kabul. The Taliban re-entered, dragging the country back into the harsh winter of theocratic rule. Economic collapse, the erasure of women from public life, and complete isolation from the international community; this ravaged arid land remains tightly held hostage by warlords, religion, and endless poverty.",
      "DZA": "The energy giant of North Africa. The 'system' composed of Algiers' military and political elites still controls the nation's lifeline. Abundant natural gas gives it significant leverage in Europe's energy crisis, but the persistently high youth unemployment rate and the thirst for freedom remain an undercurrent beneath this desert.",
      "MAR": "The kingdom guarding the Strait of Gibraltar. Rabat's royal family maintains a delicate balance, advancing steadily amidst tradition and modernization. Control over Western Sahara strengthens its nationalist narrative, but the urban-rural divide, agricultural crises brought on by drought, and tense surrounding geopolitics remain a Sword of Damocles hanging overhead.",
      "SDN": "A dirge by the Nile. The brief experiment of a civilian government vanished in the sound of gunfire, and the bloody civil war between the Sudanese Armed Forces and the Rapid Support Forces has reduced Khartoum to ruins. Countless civilians have been displaced, and the country is torn apart by warlord fragmentation and foreign interference. Peace seems out of reach.",
      "BOL": "The landlocked nation of the Andes. Possessing the world's largest lithium reserves, yet mired in power struggles within the left. The ghost of Morales and his rupture with the current government have once again turned the streets of La Paz into a sea of protests. Resource nationalism has failed to bring universal prosperity, instead becoming a bargaining chip in new geopolitical games.",
      "ECU": "The nation of the equator is experiencing an unprecedented security crisis. Once a relatively peaceful haven, it has now been reduced to a battlefield for transnational drug cartels. Politicians in Quito are exhausted by frequent impeachments and snap elections, while the port of Guayaquil is shrouded in the shadow of violence. Iron-fisted measures may bring brief respite but can hardly eradicate the deep-rooted rot.",
      "URY": "The Switzerland of South America, a rare oasis of stability. While neighboring countries are sucked into the vortex of populism and turmoil, Montevideo still maintains an enviable democratic resilience and high welfare system. However, an aging population and bottlenecks in economic growth are quietly testing the limits of this moderate consensus politics.",
      "BGR": "The edge of the Balkans, the poorest member state of the EU. Sofia's political arena is trapped in an endless cycle of elections; a fractured parliament and deep-rooted oligarchic corruption make any reform attempt arduous. Pro-Russian sentiments and dependence on European funds leave this country caught in the crossfire of the new Cold War's rift.",
      "HRV": "The pearl of the Adriatic, attracting tourists from all over Europe with its stunning coastline. But beneath the facade of a booming tourism industry lies the continuous drain of young labor and severe reliance on a single economy. Zagreb's right-wing government appears more confident after joining the Eurozone, but the old scars of the Balkan wars still ache faintly in the society's subconscious.",
      "LTU": "The staunch outpost of the Baltics. Facing immense geopolitical pressure from the East, Vilnius has chosen the toughest stance, not only acting as a proactive vanguard for NATO but also frequently touching the reverse scales of great powers in Far East diplomacy. This asymmetrical toughness has won Western praise, but it also leaves this small country in a constant state of high tension, walking on thin ice.",
      "UZB": "The heartland of Central Asia, the most populous republic. After enduring a long period of isolation and iron-fisted rule, Tashkent is implementing cautious 'New Uzbekistan' reforms. Doors are gradually opening, and foreign capital is pouring in, but behind the glamorous infrastructure, the logic of power has not fundamentally changed. It navigates deftly among Russia, China, and the West, attempting to recreate the glory of the Silk Road.",
      "GEO": "The shattered balcony of the Caucasus. The streets of Tbilisi are never short of protesters waving EU flags, yet the ruling 'Georgian Dream' party dangerously tests the edges of pragmatism and pro-Russian leaning. The wounds of Abkhazia and South Ossetia are still bleeding; the European dream and geopolitical reality collide fiercely here, tearing apart this wine-producing nation.",
      "AZE": "The land of fire by the Caspian Sea. Relying on lucrative oil and gas revenues and staunch support from Turkey, Baku reshaped the map of the Caucasus with overwhelming military superiority in the Nagorno-Karabakh war. The Aliyev family's rule is impregnable, but after the nationalist revelry fades, how to maintain strategic balance among the three geopolitical giants—Russia, China, and Iran—will be the new test.",
      "ARM": "The tragic nation under the shadow of Mount Ararat. Successive military defeats and territorial losses have plunged Yerevan into deep collective trauma. The traditional umbrella of protection, Russia, appears cold and powerless, while attempts to pivot to the West are too far away to quench immediate thirst. On this isolated Caucasian island surrounded by formidable foes, survival itself has exhausted all its strength.",
      "MNG": "The vast steppe sandwiched between two major nuclear neighbors. Politicians in Ulaanbaatar are adept at 'Third Neighbor' diplomacy, attempting to use democratic institutions and mineral resources to attract the attention of the US and Europe to hedge against geopolitical pressure. However, coal corruption scandals periodically ignite public anger, and the reality of extreme dependence on neighbors' ports and energy makes it hard for the descendants of nomads to truly ride freely.",
      "NPL": "The landlocked Buddhist nation at the foothills of the Himalayas. The political situation in Kathmandu is as unpredictable as the mountain monsoons, with the power game between various Communist factions and the Congress Party playing out in endless cycles. It carefully seeks balance between two major powers, India and China, but poverty, youth emigration, and lagging infrastructure make the path to modernization for this snow-capped nation extremely difficult.",
      "AGO": "The oil behemoth of Southwestern Africa. Although the long civil war is in the past, Luanda's glamorous skyscrapers form a glaring contrast with the endless slums in the suburbs. The ruling MPLA tightly controls the flow of petrodollars; despite the new president's attempts to push for anti-corruption and reform, the roots of vested interest groups are immeasurably deep, leaving the underclass to still struggle under the curse of black gold.",
      "SOM": "The Horn of Africa that has almost become synonymous with a 'failed state'. The central government in Mogadishu is like a fragile island, barely functioning under the protection of AU peacekeeping forces. The terrorist attacks of Al-Shabaab follow like a shadow, local tribal militias carve up the territory, and the de facto independence of Somaliland makes national unification seem light-years away. Over this arid land, the ghost of anarchy still hovers.",
      "MLI": "The turbulent eye of the storm in the Sahel. Successive military coups have led Bamako to completely break with the West; French garrisons have gloomily withdrawn, replaced by the cold figures of Russian Wagner mercenaries. Tuareg separatist forces and extremist Islamic militants in the north continue to ravage the vast desert. The junta attempts to mask the collapsing security situation with radical sovereignty narratives, but the road ahead remains painted in blood red."

    function readablePartyColor(color) {
      const c = d3.color(color || "#458b8b");
      if (!c) return "#5fa8a8";
      const rgb = d3.rgb(c);
      const luminance = (0.2126 * rgb.r + 0.7152 * rgb.g + 0.0722 * rgb.b) / 255;
      if (luminance >= 0.18) return rgb.formatHex();
      const mix = 0.42;
      const r = Math.round(rgb.r + (255 - rgb.r) * mix);
      const g = Math.round(rgb.g + (255 - rgb.g) * mix);
      const b = Math.round(rgb.b + (255 - rgb.b) * mix);
      return d3.rgb(r, g, b).formatHex();
    }

    function buildImageCandidates(url) {
      if (typeof url === "string" && url.startsWith("data:image/")) return [url];
      if (!(typeof url === "string" && url.startsWith("http"))) return [fallbackPixel];
      
      const normalized = url.replace(/^http:\/\//i, "https://");
      const list = [normalized];
      const noProto = normalized.replace(/^https?:\/\//, "");
      const wikiSpecialPrefix = "commons.wikimedia.org/wiki/Special:FilePath/";
      const specialIdx = noProto.indexOf(wikiSpecialPrefix);

      // 1. 如果是 Github 数据，专属使用 ghproxy
      if (normalized.includes("raw.githubusercontent.com") || normalized.includes("github.com")) {
        const path = normalized.split("github.com/")[1] || normalized.split("raw.githubusercontent.com/")[1] || "";
        list.push(`https://mirror.ghproxy.com/${normalized}`);
        list.push(`https://cdn.jsdelivr.net/gh/${path.replace("/master/", "@master/")}`);
      }

      // 2. 如果是维基百科图片
      if (specialIdx >= 0) {
        const fileName = decodeURIComponent(noProto.slice(specialIdx + wikiSpecialPrefix.length)).split("?")[0];
        const encodedName = encodeURIComponent(fileName);
        
        // 维基自带的缩略图引擎（直接将易报错的 svg 转为好加载的 png）
        list.push(`https://commons.wikimedia.org/wiki/Special:FilePath/${encodedName}?width=320`);
        
        // 使用针对 Wiki 优化的代理或通用 CORS 代理（避开容易拦截跳转的 weserv）
        list.push(`https://wiki.peko.top/wiki/Special:FilePath/${encodedName}?width=320`);
        list.push(`https://wsrv.nl/?url=commons.wikimedia.org/wiki/Special:FilePath/${encodedName}&output=png`);
      } else if (!normalized.includes("github")) {
        // 3. 其他普通外部图片，走通用代理
        list.push(`https://wsrv.nl/?url=${encodeURIComponent(noProto)}`);
        list.push(`https://corsproxy.io/?${encodeURIComponent(normalized)}`);
      }

      return dedupe(list);
    }

    function setImgWithFallback(id, primaryUrl, extraUrls = []) {
      const el = document.getElementById(id);
      if (!el) return;
      const queue = dedupe([
        ...buildImageCandidates(primaryUrl),
        ...extraUrls.flatMap(u => buildImageCandidates(u))
      ]);
      let idx = 0;
      const next = () => {
        idx += 1;
        el.src = queue[idx] || fallbackPixel;
      };
      el.onerror = next;
      el.src = queue[0] || fallbackPixel;
    }

    async function fetchJsonFromUrls(urls, options = {}) {
      let lastErr = null;
      for (const url of urls) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) throw new Error(`${res.status}`);
          return await res.json();
        } catch (e) {
          lastErr = e;
        }
      }
      throw lastErr || new Error("all sources failed");
    }

    async function querySparqlWithFallback(queryText) {
      const query = encodeURIComponent(queryText);
      const urls = SPARQL_ENDPOINTS.map(ep => `${ep}?format=json&query=${query}`);
      return fetchJsonFromUrls(urls, { headers: { Accept: "application/sparql-results+json" } });
    }

    function ensureClickAudio() {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        audioCtx = new Ctx();
        clickBus = audioCtx.createGain();
        clickBus.gain.value = 0.25;
        clickBus.connect(audioCtx.destination);
      }
      if (audioCtx.state === "suspended") audioCtx.resume().catch(() => {});
      return audioCtx;
    }

    function playUiClickSfx() {
      const ctx = ensureClickAudio();
      if (!ctx || !clickBus) return;
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(780, now);
      osc.frequency.exponentialRampToValueAtTime(240, now + 0.055);

      const toneGain = ctx.createGain();
      toneGain.gain.setValueAtTime(0.0001, now);
      toneGain.gain.exponentialRampToValueAtTime(0.34, now + 0.005);
      toneGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.085);

      const buffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.08), ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      const noise = ctx.createBufferSource();
      noise.buffer = buffer;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = "bandpass";
      noiseFilter.frequency.value = 2200;
      noiseFilter.Q.value = 1.4;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.0001, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.16, now + 0.003);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.06);

      osc.connect(toneGain);
      toneGain.connect(clickBus);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(clickBus);

      osc.start(now);
      osc.stop(now + 0.095);
      noise.start(now);
      noise.stop(now + 0.07);
    }

    function parseWktPoint(wkt) {
      if (typeof wkt !== "string") return null;
      const m = wkt.match(/Point\(([-\d.]+)\s+([-\d.]+)\)/i);
      if (!m) return null;
      const lon = Number(m[1]);
      const lat = Number(m[2]);
      if (!Number.isFinite(lon) || !Number.isFinite(lat)) return null;
      return [lon, lat];
    }

    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
      };
      const rgb = [f(0), f(8), f(4)].map(v => Math.round(v * 255).toString(16).padStart(2, "0")).join("");
      return `#${rgb}`;
    }

    function baseColor(code) {
      const s = canonicalIso(code);
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i) * 7919) | 0;
      const hue = Math.abs(h) % 360;
      const sat = 28 + (Math.abs(h) % 12);
      const light = 20 + (Math.abs(h >> 8) % 10);
      return hslToHex(hue, sat, light);
    }

    function lighten(hex, amount) {
      const n = parseInt(hex.replace("#", ""), 16);
      const r = Math.min(255, Math.max(0, (n >> 16) + amount));
      const g = Math.min(255, Math.max(0, ((n >> 8) & 255) + amount));
      const b = Math.min(255, Math.max(0, (n & 255) + amount));
      return `#${((r << 16) | (g << 8) | b).toString(16).padStart(6, "0")}`;
    }

    function hoverColor(code) {
      return lighten(baseColor(code), 28);
    }

    async function fetchWorldBankSeries(iso2, indicator) {
      if (!iso2) return [];
      const urls = [
        `https://api.worldbank.org/v2/country/${iso2}/indicator/${indicator}?format=json&per_page=80`,
        `https://mirror.ghproxy.com/https://api.worldbank.org/v2/country/${iso2}/indicator/${indicator}?format=json&per_page=80`
      ];
      try {
        const json = await fetchJsonFromUrls(urls);
        const rows = Array.isArray(json?.[1]) ? json[1] : [];
        return rows
          .map(r => ({ year: Number(r.date), value: Number(r.value) }))
          .filter(x => Number.isFinite(x.year) && Number.isFinite(x.value))
          .sort((a, b) => a.year - b.year);
      } catch (_) {
        return [];
      }
    }

    function buildYearSlots(series, years) {
      const map = new Map(series.map(x => [x.year, x.value]));
      return years.map(y => ({
        year: y,
        value: Number.isFinite(map.get(y)) ? map.get(y) : null
      }));
    }

    function sanitizeSeriesZeroRule(series, allowZero) {
      return (Array.isArray(series) ? series : []).map(p => ({
        year: p.year,
        value: Number.isFinite(p.value) && (allowZero || p.value !== 0) ? p.value : null
      }));
    }

    function drawSingleIndicatorChart(target, title, data, color, formatter) {
      const holder = document.createElement("div");
      holder.className = "eco-item";
      holder.innerHTML = `<div class="eco-item-title">${title}</div>`;
      target.appendChild(holder);

      const w = Math.max(300, target.clientWidth - 24);
      const h = 120;
      const m = { t: 8, r: 12, b: 22, l: 50 };
      const svg = d3.select(holder).append("svg").attr("viewBox", `0 0 ${w} ${h}`).attr("preserveAspectRatio", "none");
      const years = data.map(d => d.year);
      const valid = data.filter(d => Number.isFinite(d.value));
      const x = d3.scaleLinear().domain([years[0], years[years.length - 1]]).range([m.l, w - m.r]);
      const yDomain = valid.length > 0 ? d3.extent(valid, d => d.value) : [0, 1];
      const pad = ((yDomain[1] - yDomain[0]) || 1) * 0.12;
      const y = d3.scaleLinear().domain([yDomain[0] - pad, yDomain[1] + pad]).range([h - m.b, m.t]);

      svg.append("g")
        .attr("transform", `translate(0,${h - m.b})`)
        .call(d3.axisBottom(x).ticks(5).tickFormat(d3.format("d")))
        .call(g => g.selectAll("text").attr("fill", "#9fd0d0").style("font-size", "9px"))
        .call(g => g.selectAll("line,path").attr("stroke", "#3f7f7f"));
      svg.append("g")
        .attr("transform", `translate(${m.l},0)`)
        .call(d3.axisLeft(y).ticks(4).tickFormat(formatter))
        .call(g => g.selectAll("text").attr("fill", "#9fd0d0").style("font-size", "9px"))
        .call(g => g.selectAll("line,path").attr("stroke", "#3f7f7f"));

      const line = d3.line()
        .defined(d => Number.isFinite(d.value))
        .x(d => x(d.year))
        .y(d => y(d.value))
        .curve(d3.curveMonotoneX);
      svg.append("path")
        .datum(data)
        .attr("fill", "none")
        .attr("stroke", color)
        .attr("stroke-width", 2)
        .attr("d", line);

      svg.selectAll(".pt")
        .data(valid)
        .enter()
        .append("circle")
        .attr("cx", d => x(d.year))
        .attr("cy", d => y(d.value))
        .attr("r", 2.2)
        .attr("fill", color);
    }

    function drawParliament(list) {
      const el = document.getElementById("parliament-chart");
      const tip = document.getElementById("party-tooltip");
      el.innerHTML = "";
      tip.style.display = "none";
      tip.innerHTML = "";
      if (!Array.isArray(list) || list.length === 0) return;

      const containerW = Math.max(260, el.clientWidth || 320);
      const w = Math.max(240, Math.min(340, Math.floor(containerW * 0.95)));
      const h = 190;
      const outerR = Math.min(w / 2 - 12, h - 8);
      const innerR = outerR * 0.3;
      const seatR = 2.7;
      const totalSeats = list.reduce((s, p) => s + Math.max(0, Math.floor(Number(p.seats || 0))), 0);
      if (totalSeats <= 0) return;

      const rowCount = Math.max(6, Math.min(13, Math.round(Math.sqrt(totalSeats / 2))));
      const rows = [];
      for (let ri = 0; ri < rowCount; ri++) {
        const r = innerR + ((ri + 0.5) * (outerR - innerR)) / rowCount;
        rows.push({ r, weight: Math.max(1, r) });
      }

      const totalWeight = rows.reduce((s, r) => s + r.weight, 0);
      let assigned = 0;
      rows.forEach(r => {
        const exact = (totalSeats * r.weight) / totalWeight;
        r.slots = Math.max(1, Math.floor(exact));
        r.remainder = exact - r.slots;
        assigned += r.slots;
      });

      if (assigned < totalSeats) {
        rows.sort((a, b) => b.remainder - a.remainder);
        for (let i = 0; i < totalSeats - assigned; i++) rows[i % rows.length].slots += 1;
      } else if (assigned > totalSeats) {
        rows.sort((a, b) => a.remainder - b.remainder);
        let excess = assigned - totalSeats;
        for (let i = 0; i < rows.length && excess > 0; i++) {
          const reducible = Math.max(0, rows[i].slots - 1);
          const take = Math.min(reducible, excess);
          rows[i].slots -= take;
          excess -= take;
        }
      }

      const seatPartyData = [];
      list.forEach(p => {
        const seats = Math.max(0, Math.floor(Number(p.seats || 0)));
        for (let i = 0; i < seats; i++) {
          seatPartyData.push(p);
        }
      });

      const slots = [];
      rows.forEach(row => {
        for (let i = 0; i < row.slots; i++) {
          const a = -Math.PI + ((i + 0.5) * Math.PI) / row.slots;
          slots.push({
            x: w / 2 + Math.cos(a) * row.r,
            y: h + Math.sin(a) * row.r,
            angle: a,
            radius: row.r
          });
        }
      });

      const plotted = Math.min(seatPartyData.length, slots.length);
      const angleOrdered = slots.slice().sort((a, b) => {
        if (a.angle === b.angle) return b.radius - a.radius;
        return a.angle - b.angle;
      });
      const dotData = Array.from({ length: plotted }, (_, i) => ({
        ...angleOrdered[i],
        party: seatPartyData[i]
      }));

      const svgDots = d3.select("#parliament-chart").append("svg").attr("width", w).attr("height", h + 6);
      svgDots.selectAll("circle").data(dotData).enter().append("circle")
        .attr("cx", d => d.x)
        .attr("cy", d => d.y)
        .attr("r", seatR)
        .attr("fill", d => readablePartyColor(d.party.color || "#458b8b"))
        .style("cursor", "pointer")
        .on("mouseover", function(event, d) {
          d3.select(this).attr("r", seatR + 1);
          tip.style.display = "block";
          tip.innerHTML = `<b style=\"color:${readablePartyColor(d.party.color || "#458b8b")}\">${d.party._name || d.party.name}</b> · ${t("seat")} ${d.party.seats}<br>${d.party._desc || d.party.desc || t("noPartyDesc")}`;
          positionPartyTooltip(tip, event);
        })
        .on("mousemove", function(event) {
          positionPartyTooltip(tip, event);
        })
        .on("mouseout", function() {
          d3.select(this).attr("r", seatR);
          tip.style.display = "none";
          tip.innerHTML = "";
        });
    }
